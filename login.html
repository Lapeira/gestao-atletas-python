<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Atletas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/FCG.png" type="image/png">
    <style>
        body {
            background-image: url('/static/login-bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            width: 80%;
            max-width: 800px; 
            border-radius: 15px; 
            overflow: hidden; 
            background-color: rgba(255, 255, 255, 0.9); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); 
        }
        .form-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
        }
        .welcome-container {
            flex: 1;
            background-color: #007bff; 
            color: white; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px; 
        }
        .welcome-container img {
            height: 100px; 
            margin-bottom: 20px; 
        }
        .card {
            border-radius: 15px; 
            width: 100%; 
        }
        .alert {
  padding: 15px;
  margin-bottom: 20px;
  border: 1px solid transparent;
  border-radius: 4px;
}

.alert-success {
  color: #155724;
  background-color: #d4edda;
  border-color: #c3e6cb;
}

.alert-danger {
  color: #721c24;
  background-color: #f8d7da;
  border-color: #f5c6cb;
}

    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="card fade-in">
                <div class="card-header" style="background-color: rgba(0, 123, 255, 0.8);">
                    <h4 class="mb-0 text-center" style="color: white;">
                        <img src="/static/FCG.png" alt="Logo" style="height: 30px; margin-right: 10px;">Login
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label><i class="fas fa-user mr-1"></i>Usuário</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock mr-1"></i>Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-sign-in-alt mr-1"></i>Entrar
                        </button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('registar') }}" style="color: #007bff;">Não tem uma conta? Registe-se</a>
                    </div>
                    {% with messages = get_flashed_messages(with_categories=True) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} mt-3">  
                                <i class="fas fa-exclamation-circle mr-1"></i>{{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                </div>
            </div>
        </div>
        <div class="welcome-container">
            <img src="/static/FCG.png" alt="Logo">
            <h1>Bem-vindo!</h1>
            <p>Estamos felizes em tê-lo aqui.</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
