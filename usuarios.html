<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Utilizadores </title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/FCG.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-image: url('/static/login-bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            width: 80%; 
            max-width: 800px; 
            border-radius: 15px; 
            overflow: hidden; 
            background-color: rgba(255, 255, 255, 0.9); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); 
        }
        .form-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
        }
        .welcome-container {
            flex: 1;
            background-color: #007bff; 
            color: white; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px; 
        }
        .welcome-container img {
            height: 100px; 
            margin-bottom: 20px; 
        }
        .card {
            border-radius: 15px; 
            width: 100%; 
        }
        .alert {
  padding: 15px;
  margin-bottom: 20px;
  border: 1px solid transparent;
  border-radius: 4px;
}

.alert-success {
  color: #155724;
  background-color: #d4edda;
  border-color: #c3e6cb;
}

.alert-danger {
  color: #721c24;
  background-color: #f8d7da;
  border-color: #f5c6cb;
}

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <img src="/static/FCG.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                Gestão de Atletas
            </a>
            <a class="navbar-brand" href="#">
                <i class="fas fa-history mr-2"></i>Histórico de Pagamentos
            </a>
            <a href="{{ url_for('index') }}" class="btn btn-outline-light">
                <i class="fas fa-arrow-left mr-1"></i>Voltar
            </a>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light">Sair</a>
        </div>
    </nav>

    <div class="container">
        <h2>Lista de Utilizadores</h2>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome de Utilizador</th>
                    <th>Nome Completo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>{{ usuario[0] }}</td>
                    <td>{{ usuario[1] }}</td>
                    <td>{{ usuario[3] }}</td>
                    <td>
                        <form action="{{ url_for('remover_usuario_route', user_id=usuario[0]) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja remover este usuário?');">
                                Remover
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
